name: Release

on:
  push:
    tags:
      - '*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing or new release tag to upload assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-singlefile:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: |
          dotnet restore .\SlideShowWallpaper.Tests\SlideShowWallpaper.Tests.csproj -p:Platform=x64
          dotnet restore .\SlideShowWallpaper.csproj -p:Platform=x64 -r win-x64

      - name: Run tests
        timeout-minutes: 10
        run: |
          New-Item -ItemType Directory -Force artifacts\test-results | Out-Null
          dotnet test .\SlideShowWallpaper.Tests\SlideShowWallpaper.Tests.csproj `
            --configuration Release `
            --no-restore `
            -p:Platform=x64 `
            --logger "console;verbosity=detailed" `
            --logger "trx;LogFileName=release-tests.trx" `
            --results-directory artifacts\test-results `
            --blame-hang `
            --blame-hang-timeout 5m `
            --blame-hang-dump-type mini `
            --diag artifacts\vstest-release.log

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: |
            artifacts/test-results/**
            artifacts/vstest-release.log*

      - name: Resolve release metadata
        shell: pwsh
        run: |
          $tag = switch ('${{ github.event_name }}') {
            'release' { '${{ github.event.release.tag_name }}' }
            'workflow_dispatch' { '${{ inputs.tag }}' }
            default { '${{ github.ref_name }}' }
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw 'Release tag is required.'
          }

          $version = $tag.TrimStart([char[]]@('v', 'V'))
          if ($version -notmatch '^\d+(\.\d+){1,3}(-[0-9A-Za-z.-]+)?$') {
            throw "Release tag must contain a semantic version: $tag"
          }

          $numericVersion = $version -replace '-.*$', ''
          $versionParts = [System.Collections.Generic.List[string]]::new()
          $numericVersion.Split('.') | ForEach-Object { $versionParts.Add($_) }
          while ($versionParts.Count -lt 4) {
            $versionParts.Add('0')
          }
          $fileVersion = [string]::Join('.', $versionParts.GetRange(0, 4))

          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_VERSION=$numericVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_FILE_VERSION=$fileVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build single-file executable
        shell: pwsh
        run: |
          dotnet msbuild .\SlideShowWallpaper.csproj `
            -t:BuildSingleFile `
            -p:Configuration=Release `
            -p:Platform=x64 `
            -p:Version=$env:RELEASE_VERSION `
            -p:AssemblyVersion=$env:RELEASE_FILE_VERSION `
            -p:FileVersion=$env:RELEASE_FILE_VERSION `
            -p:InformationalVersion=$env:RELEASE_TAG `
            -v minimal

      - name: Resolve release assets
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $bundlePath = Join-Path $PWD 'artifacts\release\win-x64\SlideShowWallpaper.exe'
          if (-not (Test-Path $bundlePath)) {
            throw "Single-file executable not found at $bundlePath"
          }

          $assetName = "SlideShowWallpaper-$tag-win-x64.exe"
          $shaPath = "$bundlePath.sha256"
          $hash = (Get-FileHash $bundlePath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path $shaPath -Value "$hash *$assetName"

          "RELEASE_ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_BUNDLE_PATH=$bundlePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_SHA_PATH=$shaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create release when triggered without release event
        if: github.event_name != 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --title $env:RELEASE_TAG --generate-notes
          }

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $bundleAsset = "{0}#{1}" -f $env:RELEASE_BUNDLE_PATH, $env:RELEASE_ASSET_NAME
          $shaAsset = "{0}#{1}.sha256" -f $env:RELEASE_SHA_PATH, $env:RELEASE_ASSET_NAME
          gh release upload $env:RELEASE_TAG $bundleAsset $shaAsset --clobber --repo $env:GITHUB_REPOSITORY
