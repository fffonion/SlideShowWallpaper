name: Release

on:
  push:
    tags:
      - '*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing or new release tag to upload assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-singlefile:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: |
          dotnet restore .\SlideShowWallpaper.Tests\SlideShowWallpaper.Tests.csproj -p:Platform=x64
          dotnet restore .\SlideShowWallpaper.csproj -p:Platform=x64 -r win-x64

      - name: Run tests
        run: dotnet test .\SlideShowWallpaper.Tests\SlideShowWallpaper.Tests.csproj --configuration Release --no-restore -p:Platform=x64

      - name: Build single-file executable
        run: dotnet msbuild .\SlideShowWallpaper.csproj -t:BuildSingleFile -p:Configuration=Release -p:Platform=x64 -v minimal

      - name: Resolve release metadata
        shell: pwsh
        run: |
          $tag = switch ('${{ github.event_name }}') {
            'release' { '${{ github.event.release.tag_name }}' }
            'workflow_dispatch' { '${{ inputs.tag }}' }
            default { '${{ github.ref_name }}' }
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw 'Release tag is required.'
          }

          $bundlePath = Join-Path $PWD 'artifacts\release\win-x64\SlideShowWallpaper.exe'
          if (-not (Test-Path $bundlePath)) {
            throw "Single-file executable not found at $bundlePath"
          }

          $assetName = "SlideShowWallpaper-$tag-win-x64.exe"
          $shaPath = "$bundlePath.sha256"
          $hash = (Get-FileHash $bundlePath -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path $shaPath -Value "$hash *$assetName"

          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_BUNDLE_PATH=$bundlePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_SHA_PATH=$shaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create release when triggered without release event
        if: github.event_name != 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --title $env:RELEASE_TAG --generate-notes
          }

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $bundleAsset = "{0}#{1}" -f $env:RELEASE_BUNDLE_PATH, $env:RELEASE_ASSET_NAME
          $shaAsset = "{0}#{1}.sha256" -f $env:RELEASE_SHA_PATH, $env:RELEASE_ASSET_NAME
          gh release upload $env:RELEASE_TAG $bundleAsset $shaAsset --clobber --repo $env:GITHUB_REPOSITORY
